<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Catalog · Athenaeum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="catalog">

<header class="navbar">
  <div class="container navbar-inner">
    <a href="index.html" class="brand">
      <span class="brand-mark">
        <svg class="icon" viewBox="0 0 24 24"><path d="M3 5c1.5-1 3.5-1 5 0 1.5 1 2 1 2 1v13s-.5 0-2-1c-1.5-1-3.5-1-5 0V5Z"/><path d="M21 5c-1.5-1-3.5-1-5 0-1.5 1-2 1-2 1v13s.5 0 2-1c1.5-1 3.5-1 5 0V5Z"/></svg>
      </span>
      Athenaeum
    </a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="catalog.html" class="active">Catalog</a>
      <a href="dashboard.html">Dashboard</a>
    </nav>
    <div class="nav-actions" data-account>
      <a href="login.html" class="btn btn-ghost btn-sm">Sign In</a>
      <a href="login.html" class="btn btn-primary btn-sm">Join Library</a>
      <button class="btn btn-icon" data-nav-toggle aria-label="Menu">
        <svg class="icon" viewBox="0 0 24 24"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
      </button>
    </div>
  </div>
</header>

<section class="section">
  <div class="container">
    <div class="section-head">
      <div>
        <span class="eyebrow">The full shelf</span>
        <h2>Browse the catalog</h2>
      </div>
      <form class="search-bar" style="margin-top:0;" id="catalog-search-form">
        <svg class="icon" viewBox="0 0 24 24"><circle cx="10" cy="10" r="6.5"/><line x1="15" y1="15" x2="20.5" y2="20.5"/></svg>
        <input type="text" placeholder="Search title, author, ISBN" id="catalog-search" />
        <button class="btn btn-dark btn-sm" type="submit">Search</button>
      </form>
    </div>

    <div class="catalog-layout">
      <aside class="filter-panel">
        <div class="filter-group">
          <h4>Genre</h4>
          <div class="chip-row">
            <span class="chip active" data-genre="All">All</span>
            <span class="chip" data-genre="Fiction">Fiction</span>
            <span class="chip" data-genre="Science">Science</span>
            <span class="chip" data-genre="History">History</span>
            <span class="chip" data-genre="Fantasy">Fantasy</span>
            <span class="chip" data-genre="Poetry">Poetry</span>
            <span class="chip" data-genre="Biography">Biography</span>
          </div>
        </div>
        <div class="filter-group">
          <h4>Availability</h4>
          <label><input type="checkbox" name="availability" value="available" /> Available now</label>
          <label><input type="checkbox" name="availability" value="borrowed" /> All copies on loan</label>
        </div>
        <div class="filter-group">
          <h4>Rating</h4>
          <label><input type="radio" name="rating" value="4.8" /> ★ 4.8 &amp; up</label>
          <label><input type="radio" name="rating" value="4.5" /> ★ 4.5 &amp; up</label>
          <label><input type="radio" name="rating" value="4.0" /> ★ 4.0 &amp; up</label>
        </div>
        <button class="btn btn-outline btn-block btn-sm" id="reset-filters">Reset Filters</button>
      </aside>

      <div>
        <div class="section-tools" style="margin-bottom: 1.25rem; justify-content: space-between; display:flex;">
          <span style="color: var(--color-ink-500); font-size: 0.9rem;" id="result-count">Loading catalog</span>
          <select style="border:1px solid var(--color-cream-200); border-radius: var(--radius-pill); padding: 0.5rem 1rem;" id="sort-select">
            <option value="popular">Sort: Top Rated</option>
            <option value="newest">Sort: Newest</option>
            <option value="title">Sort: Title A to Z</option>
          </select>
        </div>

        <div class="book-grid stagger" id="catalog-grid">
        </div>
      </div>
    </div>
  </div>
</section>

<script src="assets/js/main.js"></script>
<script src="assets/js/db.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
